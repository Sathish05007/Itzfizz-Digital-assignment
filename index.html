<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scroll Car Animation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="hero-section">
  <div class="hero-track">
    <div class="road-area">
      <img src="./f1.png" class="car-img" id="car"/>
      <div class="road-trail" id="trail"></div>
      <div class="hero-text" id="valueText"></div>
    </div>

    <div class="info-card" id="box1">
      <span class="num-box">58%</span><br>
      Increase in pick up point use
    </div>

    <div class="info-card" id="box2">
      <span class="num-box">23%</span><br>
      Decreased in customer phone calls
    </div>

    <div class="info-card" id="box3">
      <span class="num-box">27%</span><br>
      Increase in pick up point use
    </div>

    <div class="info-card" id="box4">
      <span class="num-box">40%</span><br>
      Decreased in customer phone calls
    </div>

  </div>
</div>
<script src="./script.js"></script>
</body>
</html>
